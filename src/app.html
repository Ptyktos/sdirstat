<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sdirstat</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0b0d12;color:#d7dbe3;
    font:13px/1.4 ui-monospace,"SF Mono",Menlo,Consolas,monospace;overflow:hidden}
  #app{display:grid;grid-template-rows:auto 1fr auto;height:100%}
  /* top bar */
  #bar{display:flex;gap:8px;align-items:center;padding:7px 10px;background:#0e1118;border-bottom:1px solid #1b2030}
  #path{flex:0 0 360px;background:#11151e;border:1px solid #2a3346;color:#dfe5ef;border-radius:6px;padding:5px 9px;font:inherit}
  .btn{cursor:pointer;background:#1a2233;border:1px solid #2c3852;color:#cdd6e6;border-radius:6px;padding:5px 11px}
  .btn:hover{background:#243049}.btn.on{background:#2d3d63;border-color:#3f5a8c;color:#fff}
  #crumbs{display:flex;gap:3px;align-items:center;flex:1;min-width:0;overflow:hidden;flex-wrap:nowrap}
  .crumb{cursor:pointer;padding:2px 7px;border-radius:5px;background:#161b27;border:1px solid #232a3a;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:230px}
  .crumb:hover{background:#1d2434}.crumb.cur{background:#2a3550;border-color:#3a4a6e;color:#fff}
  .sep{color:#48506280}
  /* main split */
  #main{display:grid;grid-template-columns:minmax(280px,42%) 1fr;min-height:0}
  #left{border-right:1px solid #1b2030;display:flex;flex-direction:column;min-height:0}
  #thead{display:flex;padding:5px 8px;background:#10141d;border-bottom:1px solid #1b2030;color:#8893a6;user-select:none}
  #thead .c{cursor:pointer}#thead .c:hover{color:#cdd6e6}
  .col-n{flex:1;min-width:0}.col-s{width:84px;text-align:right}.col-p{width:120px}.col-i{width:74px;text-align:right}
  #rows{flex:1;overflow:auto;min-height:0}
  .row{display:flex;align-items:center;padding:1px 8px;white-space:nowrap;cursor:pointer;border-left:2px solid transparent}
  .row:hover{background:#141a26}.row.sel{background:#1f2c47;border-left-color:#5b8dff}
  .exp{width:13px;display:inline-block;color:#6f7a8d;text-align:center}
  .nm{overflow:hidden;text-overflow:ellipsis}
  .dir>.nm{color:#bcd0ff}.file>.nm{color:#c9cedb}
  .col-s{color:#7fd1a6}.col-i{color:#6f7a8d}
  .bar{height:9px;background:#1a2030;border-radius:3px;overflow:hidden;margin-top:3px}
  .bar>i{display:block;height:100%}
  /* right view */
  #right{position:relative;min-width:0}
  canvas{display:block;width:100%;height:100%}
  #tip{position:fixed;pointer-events:none;z-index:9;display:none;max-width:380px;background:#11151ef2;
    border:1px solid #2c3550;border-radius:6px;padding:7px 9px;box-shadow:0 6px 24px #000a}
  #tip b{color:#fff}#tip .sz{color:#7fd1a6}#tip .pc{color:#c7a3ff}
  /* status */
  #status{padding:4px 10px;background:#0e1118;border-top:1px solid #1b2030;color:#7c8597;display:flex;gap:14px}
  #status b{color:#aeb6c6}
  #busy{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#0b0d12cc;color:#9fb0cc;font-size:15px}
  #typesview{position:absolute;inset:0;overflow:auto;display:none;background:#0b0d12}
  #typesview table{width:100%;border-collapse:collapse}
  #typesview th{position:sticky;top:0;background:#10141d;color:#8893a6;text-align:right;padding:7px 14px;border-bottom:1px solid #1b2030}
  #typesview th.l{text-align:left}
  #typesview td{padding:3px 14px;text-align:right;border-bottom:1px solid #11151c;color:#9aa6bb}
  #typesview td.l{text-align:left}#typesview .ext{color:#bcd0ff}#typesview tr:hover td{background:#141a26}
  #typesview .bar{height:9px;width:150px;background:#1a2030;border-radius:3px;overflow:hidden}
  #typesview .bar>i{display:block;height:100%;background:#5b8dff}
  #menu{position:fixed;z-index:20;display:none;min-width:176px;background:#11151e;border:1px solid #2c3550;border-radius:7px;padding:4px;box-shadow:0 8px 30px #000b}
  .mi{padding:6px 10px;border-radius:5px;cursor:pointer;white-space:nowrap}.mi:hover{background:#202a40}
  .mi.danger{color:#ff9a9a}.mi.danger:hover{background:#3a1f24}.mi.dis{color:#566;cursor:default}.mi.dis:hover{background:none}
  .mpath{padding:5px 10px 7px;color:#6f7a8d;font-size:11px;max-width:280px;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid #283248;margin-bottom:3px}
  .msep{height:1px;background:#283248;margin:4px 2px}
  #toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#1a2740;border:1px solid #34507c;color:#cfe0ff;padding:7px 14px;border-radius:8px;display:none;z-index:30}
  #modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:#0009}
  #modbox{background:#11151e;border:1px solid #2c3550;border-radius:10px;padding:18px 20px;max-width:460px;box-shadow:0 12px 40px #000c}
  #modbox h3{margin:0 0 8px;font-size:14px;color:#fff}
  #modbox .p{color:#9aa6bb;word-break:break-all;margin-bottom:14px;font-size:12px}
  #modbox .r{display:flex;gap:10px;justify-content:flex-end}
  #modbox button{font:inherit;padding:7px 15px;border-radius:6px;cursor:pointer;border:1px solid #2c3852;background:#1a2233;color:#cdd6e6}
  #modbox button:hover{background:#243049}#modbox button.danger{background:#5a2630;border-color:#7a3340;color:#ffd9d9}
  #modbox button.danger:hover{background:#6c2c38}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <input id="path" placeholder="/path/to/scan">
    <div class="btn" id="scan">Scan</div>
    <div id="crumbs"></div>
    <div class="btn on" id="vmap" title="Treemap (QDirStat)">▦ map</div>
    <div class="btn" id="vsun" title="Sunburst (Baobab)">◎ rings</div>
    <div class="btn" id="vtype" title="File Type Statistics (QDirStat)">≡ types</div>
  </div>
  <div id="main">
    <div id="left">
      <div id="thead">
        <span class="c col-n" data-s="name">Name</span>
        <span class="c col-s" data-s="size">Size ▾</span>
        <span class="col-p">Percent</span>
        <span class="col-i">Items</span>
      </div>
      <div id="rows"></div>
    </div>
    <div id="right">
      <canvas id="cv"></canvas>
      <div id="typesview"></div>
      <div id="busy">scanning…</div>
    </div>
  </div>
  <div id="status"></div>
</div>
<div id="tip"></div>
<div id="menu"></div>
<div id="toast"></div>
<div id="modal"><div id="modbox"><h3 id="modt"></h3><div class="p" id="modp"></div>
  <div class="r"><button id="modc">Cancel</button><button class="danger" id="modok">Move to Trash</button></div></div></div>
<script>
const human=b=>{const U=["B","KB","MB","GB","TB","PB"];let v=b,i=0;while(v>=1024&&i<U.length-1){v/=1024;i++}return (i?v.toFixed(1):v)+" "+U[i]};
const hsl=(h,s,l)=>`hsl(${((h%360)+360)%360} ${s}% ${l}%)`;
const $=id=>document.getElementById(id);

let TREE=null, TYPES=[], view=$('cv'), ctx=view.getContext('2d');
let viewRoot=null, selected=null, sortBy='size', mode='map', scanPath='';
let cells=[], dpr=1, CW=0, CH=0;

// ---- file actions (open / reveal / copy / trash) ----
const isReal=node=>node&&node._p&&!node.n.startsWith('… (');  // synthetic buckets aren't real paths
function fullPath(node){const parts=[];let n=node;while(n&&n._p){parts.unshift(n.n);n=n._p}
  const root=(n&&n.n||'/').replace(/\/+$/,'');return parts.length?root+'/'+parts.join('/'):root||'/'}
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.style.display='none',2200)}
function confirmDlg(title,path){return new Promise(res=>{
  $('modt').textContent=title;$('modp').textContent=path+'   (recoverable from the system trash)';
  $('modal').style.display='flex';
  const done=v=>{$('modal').style.display='none';$('modok').onclick=null;$('modc').onclick=null;res(v)};
  $('modok').onclick=()=>done(true);$('modc').onclick=()=>done(false);});}
async function act(op,node){
  const p=fullPath(node);
  if(op==='copy'){try{await navigator.clipboard.writeText(p);toast('copied  '+p)}catch{toast(p)}return}
  if(op==='trash'){if(!await confirmDlg('Move to Trash?',p))return}
  try{const r=await fetch('/act?op='+op+'&path='+encodeURIComponent(p),{method:'POST'});const j=await r.json();
    if(!j.ok){toast(op+' failed: '+j.err);return}
    if(op==='trash'){
      // incremental: re-scan only the trashed file's parent subtree, not the whole root
      const ms=await refreshSubtree(node._p||viewRoot); selected=null; renderAll();
      toast('moved to trash · updated in '+ms.toFixed(0)+' ms  '+p);
    } else toast(j.msg+'  '+p);
  }catch(e){toast(op+' failed: '+e)}
}
function showMenu(x,y,node){
  const m=$('menu');m.innerHTML='';
  const pe=document.createElement('div');pe.className='mpath';pe.textContent=node?node.n:'';m.appendChild(pe);
  const add=(label,fn,cls)=>{const d=document.createElement('div');d.className='mi'+(cls?' '+cls:'');
    d.textContent=label;if(!cls||cls!=='dis')d.onclick=()=>{hideMenu();fn()};m.appendChild(d)};
  if(isReal(node)){
    add('Open',()=>act('open',node));
    add('Reveal in folder',()=>act('reveal',node));
    add('Copy path',()=>act('copy',node));
    const s=document.createElement('div');s.className='msep';m.appendChild(s);
    add('Move to Trash',()=>act('trash',node),'danger');
  }else add('(no actions)',null,'dis');
  m.style.display='block';
  m.style.left=Math.min(x,innerWidth-m.offsetWidth-6)+'px';
  m.style.top=Math.min(y,innerHeight-m.offsetHeight-6)+'px';
}
function hideMenu(){$('menu').style.display='none'}
window.addEventListener('click',hideMenu);
window.addEventListener('keydown',e=>{if(e.key==='Escape')hideMenu()});

// ---- model ----
function augment(node, parent, depth){
  node._p=parent; node._d=depth; node._open=(depth<1);
  let cnt=1;
  if(node.c){ for(const k of node.c){ cnt+=augment(k,node,depth+1); } }
  node._cnt=cnt; return cnt;
}
// Incremental update (streaming law): re-scan ONLY the changed subtree and fold the size delta up
// the parent chain to the root — O(subtree) + O(depth), never a full re-scan. Returns the latency ms.
async function refreshSubtree(node){
  if(!node) return 0;
  const t0=performance.now(), old=node.v||0;
  const r=await fetch('/scan?path='+encodeURIComponent(fullPath(node))+'&top=600&depth=6');
  const j=await r.json();
  if(j.tree){
    node.c=j.tree.c||[]; node.v=j.tree.v;
    let cnt=1; for(const k of node.c){cnt+=augment(k,node,node._d+1)} node._cnt=cnt; node._loaded=true;
    let delta=node.v-old, p=node._p; while(p){ p.v+=delta; p=p._p; }   // fold the delta up to root
  }
  return performance.now()-t0;
}
// a dir is incomplete (pruned) if it carries a "… (N more)" bucket — fetch its full children on demand.
function incomplete(node){return node&&node.d===1&&!node._loaded&&node.c&&node.c.some(k=>k.n.startsWith('… ('))}
async function lazyLoad(node){
  if(!incomplete(node))return;
  $('busy').style.display='flex';
  try{
    const r=await fetch('/scan?path='+encodeURIComponent(fullPath(node))+'&top=600&depth=4');
    const j=await r.json();
    if(j.tree&&j.tree.c){ node.c=j.tree.c; let cnt=1;
      for(const k of node.c){cnt+=augment(k,node,node._d+1)} node._cnt=cnt; }
    node._loaded=true;
  }catch(e){toast('load failed: '+e)}
  $('busy').style.display='none';
}
function huePath(node){ // stable hue from the index path under the original root
  let h=0, n=node;
  while(n && n._p){ const sibs=n._p.c||[]; const i=sibs.indexOf(n); h=(h*31+ i*47.5); n=n._p; }
  return h;
}

// ---- tree-table ----
function sortKids(node){
  if(!node.c) return [];
  const ks=node.c.slice();
  if(sortBy==='size') ks.sort((a,b)=>b.v-a.v);
  else ks.sort((a,b)=>a.n.localeCompare(b.n));
  return ks;
}
function renderTable(){
  const host=$('rows'); host.innerHTML='';
  const base=viewRoot;
  const walk=(node)=>{
    for(const k of sortKids(node)){
      const r=document.createElement('div');
      r.className='row '+(k.d?'dir':'file')+(k===selected?' sel':'');
      r.style.paddingLeft=(8+(k._d-base._d-1)*15)+'px';
      const pct=base.v? 100*k.v/base.v : 0;
      const hue=huePath(k);
      r.innerHTML=
        `<span class="exp">${k.d&&k.c&&k.c.length?(k._open?'▾':'▸'):''}</span>`+
        `<span class="col-n nm" title="${k.n}">${k.n}</span>`+
        `<span class="col-s">${human(k.v)}</span>`+
        `<span class="col-p"><span class="bar"><i style="width:${pct.toFixed(1)}%;background:${hsl(hue,55,55)}"></i></span></span>`+
        `<span class="col-i">${k.d?(k._cnt-1):''}</span>`;
      r.onclick=async (e)=>{
        if(e.target.classList.contains('exp') && k.d && k.c){
          k._open=!k._open; if(k._open) await lazyLoad(k); renderTable(); return; }
        selected=k; renderTable(); drawView();
      };
      r.ondblclick=async ()=>{ if(k.d&&k.c&&k.c.length){ viewRoot=k; selected=k; await lazyLoad(k); renderAll(); } };
      r.oncontextmenu=(e)=>{ e.preventDefault(); selected=k; renderTable(); drawView(); showMenu(e.clientX,e.clientY,k); };
      host.appendChild(r);
      if(k.d && k._open && k.c) walk(k);
    }
  };
  walk(base);
  document.querySelectorAll('#thead .c').forEach(c=>{
    c.firstChild&&(c.textContent=c.dataset.s==='name'?'Name':'Size');
    if(c.dataset.s===sortBy) c.textContent+=' ▾';
  });
}

// ---- squarified treemap ----
function worst(row,len){const s=row.reduce((a,b)=>a+b,0),mx=Math.max(...row),mn=Math.min(...row);
  return Math.max((len*len*mx)/(s*s),(s*s)/(len*len*mn))}
function squarify(items,rect,out){let i=0,r={...rect};
  while(i<items.length){let len=Math.min(r.w,r.h),row=[],sum=0,j=i,best=Infinity;
    while(j<items.length){const c=row.concat([items[j].area]),wr=worst(c,len);
      if(row.length===0||wr<=best){row=c;best=wr;sum+=items[j].area;j++}else break}
    const th=sum/len;
    if(r.w>=r.h){let oy=r.y;for(let k=i;k<j;k++){const hh=items[k].area/th;out.push({node:items[k].node,x:r.x,y:oy,w:th,h:hh});oy+=hh}r.x+=th;r.w-=th}
    else{let ox=r.x;for(let k=i;k<j;k++){const ww=items[k].area/th;out.push({node:items[k].node,x:ox,y:r.y,w:ww,h:th});ox+=ww}r.y+=th;r.h-=th}
    i=j}}
function kidsAreas(node,rect){const ks=(node.c||[]).filter(k=>k.v>0);if(!ks.length)return[];
  ks.sort((a,b)=>b.v-a.v);const tot=ks.reduce((s,k)=>s+k.v,0)||1,A=rect.w*rect.h;
  const items=ks.map(k=>({node:k,area:k.v/tot*A})),out=[];squarify(items,rect,out);return out}
function rrect(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function drawCell(c,hue,depth){
  const{x,y,w,h,node}=c;if(w<1||h<1)return;const isd=node.d===1;
  ctx.fillStyle=hsl(hue,isd?42:30,isd?30-Math.min(depth*3,12):58);
  rrect(x+.5,y+.5,w-1,h-1,3);ctx.fill();ctx.strokeStyle="#0b0d1255";ctx.lineWidth=1;ctx.stroke();
  cells.push(c);
  let inner=null;
  if(isd&&node.c&&w>34&&h>24){const hd=Math.min(15,h*.28);inner={x:x+3,y:y+hd,w:w-6,h:h-hd-3};
    if(inner.w>6&&inner.h>6)for(const s of kidsAreas(node,inner))drawCell(s,hue,depth+1)}
  if(node===selected){ctx.strokeStyle="#7fb3ff";ctx.lineWidth=2.5;rrect(x+1,y+1,w-2,h-2,3);ctx.stroke()}
  const lh=(isd&&inner)?Math.min(15,h*.28):h;
  if(w>46&&lh>11){ctx.fillStyle=(isd?30-Math.min(depth*3,12):58)<45?"#cdd5e6":"#10131b";
    ctx.font=(isd?"600 ":"")+"11px ui-monospace,monospace";ctx.save();ctx.beginPath();ctx.rect(x+3,y,w-6,lh);ctx.clip();
    ctx.fillText(node.n+(w>120?"  "+human(node.v):""),x+5,y+(inner?lh*.5+3:13));ctx.restore()}
}
function drawTreemap(){cells=[];let hi=0;
  for(const c of kidsAreas(viewRoot,{x:6,y:6,w:CW-12,h:CH-12})){drawCell(c,huePath(c.node),0);hi++}}

// ---- sunburst (baobab rings) ----
function drawSun(){cells=[];
  const cx=CW/2, cy=CH/2, R=Math.min(CW,CH)/2-12, ring=Math.max(26,R/7);
  const rec=(node,a0,a1,depth)=>{
    if(depth>0){
      const r0=depth*ring, r1=(depth+1)*ring; if(r0>R)return;
      const hue=huePath(node), isd=node.d===1;
      ctx.beginPath();ctx.arc(cx,cy,Math.min(r1,R),a0,a1);ctx.arc(cx,cy,r0,a1,a0,true);ctx.closePath();
      ctx.fillStyle=hsl(hue,isd?48:32,isd?34+depth*3:60);ctx.fill();
      ctx.strokeStyle="#0b0d1288";ctx.lineWidth=1;ctx.stroke();
      if(node===selected){ctx.strokeStyle="#7fb3ff";ctx.lineWidth=2.5;ctx.stroke()}
      cells.push({node,a0,a1,r0,r1:Math.min(r1,R)});
    }
    const ks=(node.c||[]).filter(k=>k.v>0);const tot=ks.reduce((s,k)=>s+k.v,0)||1;
    let a=a0;for(const k of ks){const aw=(a1-a0)*k.v/tot;if(aw>0.004)rec(k,a,a+aw,depth+1);a+=aw}
  };
  // center = viewRoot
  ctx.beginPath();ctx.arc(cx,cy,ring,0,Math.PI*2);ctx.fillStyle="#1a2536";ctx.fill();
  ctx.fillStyle="#9fb0cc";ctx.font="12px ui-monospace,monospace";ctx.textAlign="center";
  ctx.fillText(human(viewRoot.v),cx,cy+4);ctx.textAlign="start";
  rec(viewRoot,-Math.PI/2,Math.PI*1.5,0);
}
function sunAt(mx,my){const cx=CW/2,cy=CH/2;const dx=mx-cx,dy=my-cy;const r=Math.hypot(dx,dy);
  let a=Math.atan2(dy,dx);const norm=x=>{while(x< -Math.PI/2)x+=Math.PI*2;while(x>=Math.PI*1.5)x-=Math.PI*2;return x};a=norm(a);
  for(const c of cells){if(r>=c.r0&&r<=c.r1&&a>=norm(c.a0)-1e-6&&a<=norm(c.a1)+1e-6)return c} return null}

// ---- file-type statistics (QDirStat) ----
function renderTypes(){
  const host=$('typesview');const tot=TYPES.reduce((s,t)=>s+t.v,0)||1;
  let h='<table><thead><tr><th class=l>Extension</th><th>Total Size</th><th>Files</th><th class=l>Percent</th></tr></thead><tbody>';
  for(const t of TYPES){const pc=100*t.v/tot;const label=t.e==='(no ext)'?'(no ext)':'.'+t.e;
    h+=`<tr><td class="l ext">${label}</td><td>${human(t.v)}</td><td>${t.c.toLocaleString()}</td>`+
       `<td class=l><div class=bar><i style="width:${pc.toFixed(1)}%"></i></div></td></tr>`}
  h+='</tbody></table>';host.innerHTML=h;
}

// ---- view dispatch ----
function drawView(){
  if(mode==='types'){view.style.display='none';$('typesview').style.display='block';renderTypes();return}
  view.style.display='block';$('typesview').style.display='none';
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle="#0b0d12";ctx.fillRect(0,0,CW,CH);
  if(mode==='map')drawTreemap();else drawSun();}
function cellAt(mx,my){if(mode==='map'){for(let k=cells.length-1;k>=0;k--){const c=cells[k];
    if(mx>=c.x&&mx<=c.x+c.w&&my>=c.y&&my<=c.y+c.h)return c}return null}else return sunAt(mx,my)}

// ---- breadcrumb / chrome ----
function crumbs(){const c=$('crumbs');c.innerHTML='';const chain=[];let n=viewRoot;while(n){chain.unshift(n);n=n._p}
  chain.forEach((n,i)=>{const d=document.createElement('div');d.className='crumb'+(n===viewRoot?' cur':'');
    d.textContent=i===0?(n.n||'/'):n.n;d.onclick=()=>{viewRoot=n;selected=n;renderAll()};c.appendChild(d);
    if(i<chain.length-1){const s=document.createElement('span');s.className='sep';s.textContent='›';c.appendChild(s)}})}
function status(ms,ent){$('status').innerHTML=
  `<span><b>${human(viewRoot.v)}</b> in view</span><span><b>${(viewRoot._cnt-1).toLocaleString()}</b> items here</span>`+
  (ent!=null?`<span><b>${ent.toLocaleString()}</b> entries scanned</span><span><b>${ms}</b> ms</span>`:'')}
let lastMs=null,lastEnt=null;
function renderAll(){renderTable();crumbs();drawView();status(lastMs,lastEnt)}

// ---- canvas interaction ----
view.addEventListener('mousemove',e=>{const r=view.getBoundingClientRect();const c=cellAt(e.clientX-r.left,e.clientY-r.top);
  const tip=$('tip');if(!c){tip.style.display='none';view.style.cursor='default';return}
  view.style.cursor=c.node.d===1?'pointer':'default';
  tip.innerHTML=`<b>${c.node.n}</b> ${c.node.d===1?'📁':''}<br><span class=sz>${human(c.node.v)}</span> · <span class=pc>${(100*c.node.v/viewRoot.v).toFixed(1)}%</span>`;
  tip.style.display='block';let tx=e.clientX+14,ty=e.clientY+14;
  if(tx+tip.offsetWidth>innerWidth)tx=e.clientX-tip.offsetWidth-14;if(ty+tip.offsetHeight>innerHeight)ty=e.clientY-tip.offsetHeight-14;
  tip.style.left=tx+'px';tip.style.top=ty+'px'});
view.addEventListener('mouseleave',()=>$('tip').style.display='none');
view.addEventListener('click',e=>{const r=view.getBoundingClientRect();const c=cellAt(e.clientX-r.left,e.clientY-r.top);
  if(c){selected=c.node;openTo(c.node);renderTable();drawView()}});
view.addEventListener('dblclick',async e=>{const r=view.getBoundingClientRect();const c=cellAt(e.clientX-r.left,e.clientY-r.top);
  if(c&&c.node.d===1&&c.node.c&&c.node.c.length){viewRoot=c.node;selected=c.node;await lazyLoad(c.node);renderAll()}});
view.addEventListener('contextmenu',e=>{e.preventDefault();const r=view.getBoundingClientRect();
  const c=cellAt(e.clientX-r.left,e.clientY-r.top);if(c){selected=c.node;openTo(c.node);renderTable();drawView();
  showMenu(e.clientX,e.clientY,c.node)}});
function openTo(node){let n=node._p;while(n){n._open=true;n=n._p}}

// ---- header sort + view toggles ----
document.querySelectorAll('#thead .c').forEach(c=>c.onclick=()=>{sortBy=c.dataset.s;renderTable();drawView()});
function setView(m){mode=m;
  $('vmap').classList.toggle('on',m==='map');$('vsun').classList.toggle('on',m==='sun');$('vtype').classList.toggle('on',m==='types');
  drawView()}
$('vmap').onclick=()=>setView('map');$('vsun').onclick=()=>setView('sun');$('vtype').onclick=()=>setView('types');

// ---- scan ----
async function scan(path){
  $('busy').style.display='flex';
  try{
    const res=await fetch('/scan?path='+encodeURIComponent(path)+'&top=120');
    const j=await res.json();
    TREE=j.tree; TYPES=j.types||[]; augment(TREE,null,0); viewRoot=TREE; selected=null;
    scanPath=TREE.n; lastMs=j.scan_ms; lastEnt=j.entries; $('path').value=TREE.n;
    renderAll();
  }catch(e){alert('scan failed: '+e);}
  $('busy').style.display='none';
}
$('scan').onclick=()=>scan($('path').value);
$('path').addEventListener('keydown',e=>{if(e.key==='Enter')scan($('path').value)});

// ---- resize ----
function resize(){const r=$('right').getBoundingClientRect();dpr=window.devicePixelRatio||1;CW=r.width;CH=r.height;
  view.width=CW*dpr;view.height=CH*dpr;if(viewRoot)drawView()}
window.addEventListener('resize',resize);
window.addEventListener('keydown',e=>{if(e.key==='Backspace'&&document.activeElement!==$('path')){e.preventDefault();
  if(viewRoot&&viewRoot._p){viewRoot=viewRoot._p;selected=viewRoot;renderAll()}}});

// boot
resize();
scan('/usr');
</script>
</body>
</html>
