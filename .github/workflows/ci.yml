name: ci

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build (release, locked)
        run: cargo build --release --locked
      - name: Test
        run: cargo test --release --locked
      - name: Cross-compile check (Windows target keeps building)
        run: |
          rustup target add x86_64-pc-windows-gnu
          cargo check --release --target x86_64-pc-windows-gnu
      - name: Clippy (informational — the core uses a deliberately compact style)
        continue-on-error: true
        run: rustup component add clippy && cargo clippy --release --all-targets
