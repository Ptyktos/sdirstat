# OpenSSF Scorecard — scores the repo against security best practices and publishes the result
# (the README badge reads from the public results). Runs weekly, on the default-branch push, and on
# branch-protection changes. Actions pinned to commit SHAs.
name: scorecard

on:
  branch_protection_rule: {}
  schedule:
    - cron: '37 4 * * 1'   # weekly, Monday 04:37 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload the SARIF result to code scanning
      id-token: write          # publish results to the public OpenSSF API (for the badge)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
