# Public release pipeline. On a `v*` tag (or manual run) each OS runner builds BOTH:
#   - the CLI binaries (portable + packages), and
#   - the native desktop app installers (Tauri).
# Everything is attached to a single GitHub Release.
#
# ⚠️  TESTED STATUS: only the Linux jobs (CLI binaries + desktop .deb) have actually been built and
#     run. The Windows (.exe / .msi / NSIS) and macOS (universal .dmg) jobs are UNTESTED — written
#     to the standard Tauri + cargo pattern but never executed on a real runner. The first `v*` tag
#     is their first real run; expect to iterate (paths, bundle names, toolchain quirks) before they
#     are green. The Rust *core* does compile-check for both targets; the desktop *bundling* there
#     does not yet.
#
# Runner / toolchain notes:
#   - macOS binaries need a Mac host; GitHub's free `macos-latest` provides one (the reason this
#     lives here, not in .gitlab-ci.yml which has no Mac). The desktop app there is a universal
#     (Intel + Apple Silicon) .dmg.
#   - Windows uses the native MSVC toolchain (no mingw); WebView2 is preinstalled on the runner.
#   - Only first-party `actions/*` are used; Rust + `gh` are preinstalled and the Tauri CLI is
#     `cargo install`-ed — no third-party actions, to keep the supply-chain surface minimal. Pin
#     the `actions/*` tags to commit SHAs if you want stricter hygiene.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}      # allow a manual run from the Actions tab (no release cut)

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CLI — glibc binary + .deb, and a static musl binary
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools
          cargo build --release --locked
          sh packaging/build-deb.sh "$VER"
          cargo build --release --locked --target x86_64-unknown-linux-musl
          mkdir -p dist
          cp target/release/sdirstat                           "dist/sdirstat-${VER}-linux-x86_64"
          cp target/x86_64-unknown-linux-musl/release/sdirstat "dist/sdirstat-${VER}-linux-x86_64-musl"

      - name: Desktop — .deb + .AppImage (Tauri)
        env:
          # linuxdeploy ships as an AppImage; CI runners have no FUSE, so extract-and-run it.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libfuse2
          cargo install tauri-cli --version "^2" --locked
          mkdir -p desktop/binaries
          cp target/release/sdirstat desktop/binaries/sdirstat-x86_64-unknown-linux-gnu
          # The .deb is the primary installer — build it on its own so AppImage can't break it.
          ( cd desktop && cargo tauri build --bundles deb )
          cp desktop/target/release/bundle/deb/*.deb \
             "dist/sdirstat-desktop-${VER}-linux-x86_64.deb"
          # AppImage is best-effort (upstream linuxdeploy-plugin-gtk is finicky); never fail the run.
          if ( cd desktop && cargo tauri build --bundles appimage ); then
            cp desktop/target/release/bundle/appimage/*.AppImage \
               "dist/sdirstat-desktop-${VER}-linux-x86_64.AppImage"
          else
            echo "::warning::AppImage bundling failed (linuxdeploy-plugin-gtk); shipping .deb only"
          fi

      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/* }

  # UNTESTED — no Windows host was available locally. Native MSVC build, WebView2 preinstalled.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: CLI — sdirstat.exe (native MSVC)
        shell: bash
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          cargo build --release --locked
          mkdir -p dist
          cp target/release/sdirstat.exe "dist/sdirstat-${VER}-windows-x86_64.exe"

      - name: Desktop — .msi + NSIS .exe (Tauri)
        shell: bash
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          cargo install tauri-cli --version "^2" --locked
          mkdir -p desktop/binaries
          cp target/release/sdirstat.exe desktop/binaries/sdirstat-x86_64-pc-windows-msvc.exe
          ( cd desktop && cargo tauri build )
          cp desktop/target/release/bundle/msi/*.msi \
             "dist/sdirstat-desktop-${VER}-windows-x86_64.msi" || echo "msi skipped"
          cp desktop/target/release/bundle/nsis/*.exe \
             "dist/sdirstat-desktop-${VER}-windows-x86_64-setup.exe" || echo "nsis skipped"

      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/* }

  # UNTESTED — no macOS host was available locally. Universal (Intel + Apple Silicon) .dmg.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: CLI — universal (Intel + Apple Silicon) binary
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          mkdir -p dist
          lipo -create -output "dist/sdirstat-${VER}-macos-universal" \
            target/x86_64-apple-darwin/release/sdirstat \
            target/aarch64-apple-darwin/release/sdirstat
          lipo -info "dist/sdirstat-${VER}-macos-universal"

      - name: Desktop — universal .dmg (Tauri)
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          cargo install tauri-cli --version "^2" --locked
          mkdir -p desktop/binaries
          cp "dist/sdirstat-${VER}-macos-universal" desktop/binaries/sdirstat-universal-apple-darwin
          ( cd desktop && cargo tauri build --target universal-apple-darwin --bundles dmg )
          cp desktop/target/universal-apple-darwin/release/bundle/dmg/*.dmg \
             "dist/sdirstat-desktop-${VER}-macos-universal.dmg" || echo "dmg skipped"

      - uses: actions/upload-artifact@v4
        with: { name: macos, path: dist/* }

  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write          # required to create the Release and upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Cut the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
