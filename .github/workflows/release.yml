# Public release pipeline. On a `v*` tag each OS runner builds the CLI binaries + the native desktop
# installer; the release job then checksums, SBOMs, signs (cosign keyless), and attests (SLSA build
# provenance) every artifact and cuts a GitHub Release.
#
# Supply chain: all third-party actions are pinned to a commit SHA (the tag in the trailing comment is
# informational). Signing/attestation use GitHub OIDC — no long-lived secrets. Code signing of the
# macOS/Windows installers is scaffolded but inert until you add the certs as repo secrets (see
# docs/SIGNING.md).
#
# TESTED STATUS: only the Linux jobs have actually run. Windows/macOS jobs are written to the standard
# Tauri + cargo pattern but unexecuted on a real runner — expect to iterate on the first tag.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: CLI — glibc binary + .deb, and a static musl binary
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools
          cargo build --release --locked
          sh packaging/build-deb.sh "$VER"
          cargo build --release --locked --target x86_64-unknown-linux-musl
          mkdir -p dist
          cp target/release/sdirstat                           "dist/sdirstat-${VER}-linux-x86_64"
          cp target/x86_64-unknown-linux-musl/release/sdirstat "dist/sdirstat-${VER}-linux-x86_64-musl"
      - name: Desktop — .deb + .AppImage (Tauri)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libfuse2
          cargo install tauri-cli --version "^2" --locked
          mkdir -p desktop/binaries
          cp target/release/sdirstat desktop/binaries/sdirstat-x86_64-unknown-linux-gnu
          ( cd desktop && cargo tauri build --bundles deb )
          cp desktop/target/release/bundle/deb/*.deb "dist/sdirstat-desktop-${VER}-linux-x86_64.deb"
          if ( cd desktop && cargo tauri build --bundles appimage ); then
            cp desktop/target/release/bundle/appimage/*.AppImage "dist/sdirstat-desktop-${VER}-linux-x86_64.AppImage"
          else
            echo "::warning::AppImage bundling failed (linuxdeploy-plugin-gtk); shipping .deb only"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: linux, path: dist/* }

  # UNTESTED — no Windows host was available locally. Native MSVC build, WebView2 preinstalled.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: CLI — sdirstat.exe (native MSVC)
        shell: bash
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          cargo build --release --locked
          mkdir -p dist
          cp target/release/sdirstat.exe "dist/sdirstat-${VER}-windows-x86_64.exe"
      - name: Desktop — .msi + NSIS .exe (Tauri)
        shell: bash
        # Authenticode: Tauri signs when bundle.windows.certificateThumbprint is set + the cert is in
        # the store. The secret-gated import step is scaffolded in docs/SIGNING.md (inert by default).
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          cargo install tauri-cli --version "^2" --locked
          mkdir -p desktop/binaries
          cp target/release/sdirstat.exe desktop/binaries/sdirstat-x86_64-pc-windows-msvc.exe
          ( cd desktop && cargo tauri build )
          cp desktop/target/release/bundle/msi/*.msi  "dist/sdirstat-desktop-${VER}-windows-x86_64.msi" || echo "msi skipped"
          cp desktop/target/release/bundle/nsis/*.exe "dist/sdirstat-desktop-${VER}-windows-x86_64-setup.exe" || echo "nsis skipped"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: windows, path: dist/* }

  # UNTESTED — no macOS host was available locally. Universal (Intel + Apple Silicon) .dmg.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: CLI — universal (Intel + Apple Silicon) binary
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          mkdir -p dist
          lipo -create -output "dist/sdirstat-${VER}-macos-universal" \
            target/x86_64-apple-darwin/release/sdirstat \
            target/aarch64-apple-darwin/release/sdirstat
      - name: Desktop — universal .dmg (Tauri)
        # Developer ID signing + notarization: Tauri picks up the APPLE_* env automatically when set.
        # With no secrets the env is empty and Tauri produces an unsigned .dmg (see docs/SIGNING.md).
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eu
          VER="${GITHUB_REF_NAME#v}"; VER="${VER:-0.1.0}"
          cargo install tauri-cli --version "^2" --locked
          mkdir -p desktop/binaries
          cp "dist/sdirstat-${VER}-macos-universal" desktop/binaries/sdirstat-universal-apple-darwin
          ( cd desktop && cargo tauri build --target universal-apple-darwin --bundles dmg )
          cp desktop/target/universal-apple-darwin/release/bundle/dmg/*.dmg \
             "dist/sdirstat-desktop-${VER}-macos-universal.dmg" || echo "dmg skipped"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: macos, path: dist/* }

  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write       # create the Release + upload assets
      id-token: write       # cosign keyless (Fulcio/Rekor) + provenance, via OIDC — no stored keys
      attestations: write   # actions/attest-build-provenance
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums (SHA256SUMS)
        run: ( cd dist && sha256sum * > SHA256SUMS )

      - name: SBOM (SPDX JSON, syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sdirstat.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign every artifact (cosign keyless)
        run: |
          set -eu
          cd dist
          for f in *; do
            case "$f" in *.cosign.bundle) continue;; esac
            cosign sign-blob --yes "$f" --bundle "$f.cosign.bundle"
          done

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/*'

      - name: Cut the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
