name: pages

on:
  push:
    branches: [main]
  release:
    types: [published]   # rebuild the apt repo when a new release adds a .deb
  workflow_dispatch: {}

# Least privilege: read-only by default; only the deploy job elevates to what Pages needs.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false   # don't cancel an in-flight Pages deploy (GitHub's recommended setting)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build static site
        run: |
          set -eu
          mkdir -p _site/assets
          cp docs/index.html _site/index.html
          cp assets/social-card.png _site/assets/social-card.png
          cp packaging/sdirstat.svg _site/assets/sdirstat.svg
      - name: Build signed apt repo at /apt (if a release .deb + GPG key exist)
        env:
          GH_TOKEN: ${{ github.token }}
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          set -eu
          if [ -z "${APT_GPG_PRIVATE_KEY:-}" ]; then
            echo "::notice::APT_GPG_PRIVATE_KEY not set — skipping apt repo (site still deploys)"; exit 0
          fi
          sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils gnupg
          mkdir -p _site/apt/pool/main _site/apt/dists/stable/main/binary-amd64
          # APT repos are multi-version: collect every sdirstat .deb across all releases.
          got=0
          for tag in $(gh release list --repo "$GITHUB_REPOSITORY" --json tagName --jq '.[].tagName' 2>/dev/null || true); do
            if gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern 'sdirstat*.deb' \
                 --dir _site/apt/pool/main --clobber 2>/dev/null; then got=1; fi
          done
          if [ "$got" = 0 ]; then
            echo "::notice::no sdirstat .deb in any release yet — skipping apt repo"; rm -rf _site/apt; exit 0
          fi
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')
          ( cd _site/apt
            dpkg-scanpackages --multiversion pool/main > dists/stable/main/binary-amd64/Packages
            gzip -kf dists/stable/main/binary-amd64/Packages
            apt-ftparchive \
              -o APT::FTPArchive::Release::Origin=sdirstat \
              -o APT::FTPArchive::Release::Label=sdirstat \
              -o APT::FTPArchive::Release::Suite=stable \
              -o APT::FTPArchive::Release::Codename=stable \
              -o APT::FTPArchive::Release::Components=main \
              -o APT::FTPArchive::Release::Architectures=amd64 \
              release dists/stable > dists/stable/Release
            gpg --batch --yes --default-key "$KEYID" --clearsign -o dists/stable/InRelease dists/stable/Release
            gpg --batch --yes --default-key "$KEYID" -abs       -o dists/stable/Release.gpg dists/stable/Release )
          gpg --batch --armor --export "$KEYID" > _site/apt/sdirstat.gpg.key   # public key for users
          echo "apt repo built: $(ls _site/apt/pool/main | wc -l) package file(s)"
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token for deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
