name: pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege: read-only by default; only the deploy job elevates to what Pages needs.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build static site
        run: |
          set -eu
          mkdir -p _site/assets
          cp docs/index.html _site/index.html
          cp assets/social-card.png _site/assets/social-card.png
          cp packaging/sdirstat.svg _site/assets/sdirstat.svg
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token for deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
